name: Build DebManager Dynamic Final

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet zstandard

      - name: Unzip Project
        run: unzip DebManager.xcodeproj.zip

      - name: Dynamic Download iOS Binaries
        run: python .github/scripts/fetch_ios_bins.py

      - name: Build
        run: |
          set -o pipefail
          if ! xcodebuild clean build -project DebManager.xcodeproj -scheme DebManager -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -destination "generic/platform=iOS" 2>&1 | tee build.log; then
            error_line=$(grep -m1 'error:' build.log || true)
            if [ -z "$error_line" ]; then
              error_line=$(tail -n 20 build.log | tr '\n' ' ' | sed 's/  */ /g')
            fi
            echo "::error::$error_line"
            exit 1
          fi

      - name: Package
        run: |
          rm -rf Payload DebManager_Fixed_Final.tipa
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/DebManager.app Payload/
          mkdir -p Payload/DebManager.app/Helpers Payload/DebManager.app/Frameworks
          shopt -s nullglob
          helper_bins=(ios_bins/dpkg-deb ios_bins/zstd)
          helper_libs=(ios_bins/*.dylib)
          if ((${#helper_bins[@]})); then
            cp -P "${helper_bins[@]}" Payload/DebManager.app/Helpers/
          fi
          if ((${#helper_libs[@]})); then
            cp -P "${helper_libs[@]}" Payload/DebManager.app/Helpers/
            cp -P "${helper_libs[@]}" Payload/DebManager.app/Frameworks/
          fi
          find Payload/DebManager.app/Helpers -type f \( -name "dpkg-deb" -o -name "zstd" \) -exec chmod 755 {} \;
          find Payload/DebManager.app/Helpers Payload/DebManager.app/Frameworks -type f \( -name "*.dylib" -o -name "dpkg-deb" -o -name "zstd" \) -exec codesign --force --sign - --timestamp=none {} \;
          codesign --force --sign - --deep --timestamp=none Payload/DebManager.app
          zip -r9 DebManager_Fixed_Final.tipa Payload -x "*.DS_Store"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DebManager-Fixed-Final
          path: DebManager_Fixed_Final.tipa
