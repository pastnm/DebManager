name: Build DebManager Dynamic Final

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --quiet zstandard

      - name: Unzip Project
        run: unzip DebManager.xcodeproj.zip

      - name: Dynamic Download iOS Binaries
        run: python .github/scripts/fetch_ios_bins.py

      - name: Build
        run: |
          xcodebuild clean build -project DebManager.xcodeproj -scheme DebManager -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -destination "generic/platform=iOS"

      - name: Package
        run: |
          mkdir -p Payload/DebManager.app
          cp -r build/Build/Products/Release-iphoneos/DebManager.app/ Payload/
          shopt -s nullglob
          extras=(dpkg-deb zstd libzstd*.dylib liblzma*.dylib)
          cp -P "${extras[@]}" Payload/DebManager.app/
          zip -r9 DebManager_Fixed_Final.tipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DebManager-Fixed-Final
          path: DebManager_Fixed_Final.tipa
