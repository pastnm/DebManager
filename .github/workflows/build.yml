name: Build DebManager Dynamic Robust
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip DebManager.xcodeproj.zip

      - name: Dynamic Download iOS Binaries
        run: |
          mkdir -p ios_bins
          cd ios_bins
          
          # 动态尝试不同的索引文件路径和压缩格式
          echo "正在获取软件源最新索引..."
          
          # 尝试多个可能的索引地址
          fetch_packages() {
            local base_url=$1
            echo "尝试从 $base_url 获取索引..."
            curl -sfL "$base_url/Packages.xz" -o Packages.xz && xz -d Packages.xz && return 0
            curl -sfL "$base_url/Packages.gz" -o Packages.gz && gunzip Packages.gz && return 0
            curl -sfL "$base_url/Packages" -o Packages && return 0
            return 1
          }

          # 依次尝试官方源和镜像源
          fetch_packages "https://apt.procurs.us/dists/iphoneos-arm64/1900/main/binary-iphoneos-arm" || \
          fetch_packages "https://strap.palera.in/dists/iphoneos-arm64/1900/main/binary-iphoneos-arm" || \
          fetch_packages "https://apt.procurs.us/dists/iphoneos-arm64/main/binary-iphoneos-arm"

          if [ ! -f Packages ]; then
            echo "❌ 严重错误：所有索引文件获取均失败！"
            exit 1
          fi

          # 自动解析当前最新的软件包路径
          get_path() {
            grep -A 25 "Package: $1$" Packages | grep "Filename: " | head -n 1 | cut -d' ' -f2
          }

          # 构造完整的下载链接
          DPKG_URL="https://apt.procurs.us/$(get_path 'dpkg')"
          ZSTD_URL="https://apt.procurs.us/$(get_path 'zstd')"
          LIBZSTD_URL="https://apt.procurs.us/$(get_path 'libzstd1')"
          LIBLZMA_URL="https://apt.procurs.us/$(get_path 'liblzma5')"

          echo "解析到组件地址:"
          echo "DPKG: $DPKG_URL"
          echo "ZSTD: $ZSTD_URL"

          # 执行下载
          curl -fLO "$DPKG_URL" || curl -fLO "https://strap.palera.in/$(get_path 'dpkg')"
          curl -fLO "$ZSTD_URL" || curl -fLO "https://strap.palera.in/$(get_path 'zstd')"
          curl -fLO "$LIBZSTD_URL" || curl -fLO "https://strap.palera.in/$(get_path 'libzstd1')"
          curl -fLO "$LIBLZMA_URL" || curl -fLO "https://strap.palera.in/$(get_path 'liblzma5')"

          # 解压所有 deb 包
          for f in *.deb; do ar x "$f" && tar -xf data.tar.*; done
          
          # 提取需要的二进制文件和动态库
          find . -name "dpkg-deb" -type f -exec cp {} ../ \;
          find . -name "zstd" -type f -exec cp {} ../ \;
          find . -name "libzstd.1.dylib" -type f -exec cp {} ../ \;
          find . -name "liblzma.5.dylib" -type f -exec cp {} ../ \;
          cd ..
          
          # 验证文件是否存在
          ls -l dpkg-deb zstd libzstd.1.dylib liblzma.5.dylib

      - name: Inject Chinese Localization
        run: |
          # 汉化代码注入
          cat << 'EOF' > /tmp/zh.strings
          "about"="关于";
          "add"="添加";
          "add_repo"="添加软件源";
          "add_repo_hint"="输入兼容 Cydia/Sileo 的软件源 URL";
          "already_downloaded"="已下载";
          "app_desc"="iOS .deb 软件包管理器";
          "app_name"="应用名称";
          "back"="返回";
          "browse"="浏览";
          "browse_repo"="浏览";
          "cancel"="取消";
          "confirm_delete"="确认删除此软件包？";
          "conversion_failed"="转换失败";
          "convert"="转换";
          "convert_to"="转换为";
          "converted"="转换完成！";
          "converted_to"="已转换为";
          "converting"="转换中...";
          "current_arch"="当前架构";
          "delete"="删除";
          "deleted"="已删除";
          "developer"="开发者";
          "done"="完成";
          "download"="下载";
          "download_failed"="下载失败";
          "downloaded_success"="下载成功";
          "downloading"="下载中...";
          "downloads"="下载";
          "follow_twitter"="在 𝕏 上关注";
          "language"="语言";
          "language_auto"="跟随设备语言";
          "loading"="加载中...";
          "managed_debs"="已管理的软件包";
          "no"="否";
          "no_downloads"="无已下载的软件包";
          "no_downloads_sub"="下载的 .deb 文件将显示在此处";
          "no_repos"="无软件源";
          "no_repos_sub"="添加软件源以开始浏览和下载 .deb 软件包";
          "no_results"="未找到结果。请尝试不同的搜索词。";
          "packages"="软件包";
          "packages_converted"="个软件包已转换";
          "remove"="移除";
          "repo_packages"="软件源软件包";
          "repo_url"="软件源 URL";
          "repos"="软件源";
          "save"="保存";
          "saved_to"="已保存到“文件”应用";
          "search"="搜索软件包...";
          "search_btn"="搜索";
          "search_results"="搜索结果";
          "searching"="搜索中...";
          "select"="选择";
          "settings"="设置";
          "share"="分享";
          "shared_via"="已打开分享面板";
          "start_search"="搜索 .deb 软件包";
          "start_search_sub"="从 iOS 软件源中查找插件、应用和工具";
          "supported_arch"="支持的架构";
          "supported_languages"="支持的语言";
          "target_arch"="目标架构";
          "trollstore_compatible"="兼容 TrollStore (巨魔)";
          "version"="版本 1.0.0";
          "yes"="是";
          EOF
          find . -name "Localizable.strings" -exec cp /tmp/zh.strings {} \;

      - name: Build
        run: |
          xcodebuild clean build -project DebManager.xcodeproj -scheme DebManager -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -destination "generic/platform=iOS"

      - name: Package
        run: |
          mkdir -p Payload/DebManager.app
          cp -r build/Build/Products/Release-iphoneos/DebManager.app/ Payload/
          cp dpkg-deb zstd libzstd.1.dylib liblzma.5.dylib Payload/DebManager.app/
          zip -r9 DebManager_Fixed_Final.tipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DebManager-Fixed-Final
          path: DebManager_Fixed_Final.tipa
