name: Build DebManager Dynamic Final

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip DebManager.xcodeproj.zip

      - name: Dynamic Download iOS Binaries
        run: |
          mkdir -p ios_bins
          cd ios_bins

          BASE_URL="https://strap.palera.in"
          REPO_PATH="$BASE_URL/dists/iphoneos-arm64/1900/main/binary-iphoneos-arm"

          curl -fsSL "$REPO_PATH/Packages" -o Packages

          get_path() {
            awk -v pkg="$1" '
              $0 == "Package: " pkg { found = 1; next }
              found && /^Filename: / { print substr($0, 11); exit }
              found && /^Package: / { found = 0 }
            ' Packages
          }

          download_package() {
            local pkg="$1"
            local path
            path="$(get_path "$pkg")"

            if [ -z "$path" ]; then
              echo "Failed to resolve package path for $pkg"
              exit 1
            fi

            curl -fsSLo "${pkg}.deb" "$BASE_URL/$path"
          }

          for pkg in dpkg zstd libzstd1 liblzma5; do
            download_package "$pkg"
          done

          python3 -m pip install --quiet zstandard

          mkdir -p extracted
          for f in *.deb; do
            pkg_dir="extracted/${f%.deb}"
            mkdir -p "$pkg_dir"

            (
              cd "$pkg_dir"
              tar -xf "../../$f"

              if [ -f data.tar.zst ]; then
                python3 -c "import zstandard as zstd; src=open('data.tar.zst','rb'); dst=open('data.tar','wb'); zstd.ZstdDecompressor().copy_stream(src, dst); src.close(); dst.close()"
                tar -xf data.tar
              elif [ -f data.tar.xz ] || [ -f data.tar.gz ] || [ -f data.tar ]; then
                set -- data.tar.*
                tar -xf "$1"
              else
                echo "Missing data archive in $f"
                exit 1
              fi
            )
          done

          cp -P extracted/*/usr/bin/dpkg-deb ../
          cp -P extracted/*/usr/bin/zstd ../
          cp -P extracted/*/usr/lib/libzstd*.dylib ../
          cp -P extracted/*/usr/lib/liblzma*.dylib ../
          cd ..

          ls -l dpkg-deb zstd libzstd*.dylib liblzma*.dylib

      - name: Build
        run: |
          xcodebuild clean build -project DebManager.xcodeproj -scheme DebManager -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -destination "generic/platform=iOS"

      - name: Package
        run: |
          mkdir -p Payload/DebManager.app
          cp -r build/Build/Products/Release-iphoneos/DebManager.app/ Payload/
          cp -P dpkg-deb zstd libzstd*.dylib liblzma*.dylib Payload/DebManager.app/
          zip -r9 DebManager_Fixed_Final.tipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DebManager-Fixed-Final
          path: DebManager_Fixed_Final.tipa
