name: Build DebManager Ultimate Robust
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Unzip Project
        run: unzip DebManager.xcodeproj.zip

      - name: Download and Extract iOS Binaries
        run: |
          mkdir -p ios_bins
          cd ios_bins
          
          # 定义稳定的镜像源列表
          MIRRORS=(
            "https://apt.procurs.us/pool/main/iphoneos-arm64/1900"
            "https://strap.palera.in/pool/main/iphoneos-arm64/1900"
          )

          # 尝试下载函数：遍历镜像源并尝试不同可能的版本号
          smart_download() {
            local folder=$1
            local pkg_name=$2
            local versions=("1.22.11" "1.22.6" "1.5.7" "1.5.6" "5.6.3" "5.6.1" "5.4.5")
            
            for url in "${MIRRORS[@]}"; do
              for ver in "${versions[@]}"; do
                local full_url="${url}/${folder}/${pkg_name}_${ver}_iphoneos-arm.deb"
                echo "尝试下载: $full_url"
                if curl -fLO "$full_url"; then
                  echo "成功下载 $pkg_name"
                  return 0
                fi
              done
            done
            echo "错误：无法下载 $pkg_name"
            return 1
          }

          # 执行下载任务
          smart_download "dpkg" "dpkg"
          smart_download "zstd" "zstd"
          smart_download "zstd" "libzstd1"
          smart_download "xz-utils" "liblzma5" || smart_download "lzma" "liblzma5"

          # 统一解压所有 deb 包
          for f in *.deb; do
            ar x "$f"
            tar -xf data.tar.*
          done

          # 使用 find 自动定位二进制文件，避免路径写死
          find . -name "dpkg-deb" -type f -exec cp {} ../ \;
          find . -name "zstd" -type f -exec cp {} ../ \;
          find . -name "libzstd.1.dylib" -type f -exec cp {} ../ \;
          find . -name "liblzma.5.dylib" -type f -exec cp {} ../ \;
          
          cd ..
          # 验证文件是否已准备就绪
          ls -l dpkg-deb zstd libzstd.1.dylib liblzma.5.dylib

      - name: Inject Chinese Localization
        run: |
          cat << 'EOF' > /tmp/zh.strings
          "about"="关于";
          "add"="添加";
          "add_repo"="添加软件源";
          "add_repo_hint"="输入兼容 Cydia/Sileo 的软件源 URL";
          "already_downloaded"="已下载";
          "app_desc"="iOS .deb 软件包管理器";
          "app_name"="应用名称";
          "back"="返回";
          "browse"="浏览";
          "browse_repo"="浏览";
          "cancel"="取消";
          "confirm_delete"="确认删除此软件包？";
          "conversion_failed"="转换失败";
          "convert"="转换";
          "convert_to"="转换为";
          "converted"="转换完成！";
          "converted_to"="已转换为";
          "converting"="转换中...";
          "current_arch"="当前架构";
          "delete"="删除";
          "deleted"="已删除";
          "developer"="开发者";
          "done"="完成";
          "download"="下载";
          "download_failed"="下载失败";
          "downloaded_success"="下载成功";
          "downloading"="下载中...";
          "downloads"="下载";
          "follow_twitter"="在 𝕏 上关注";
          "language"="语言";
          "language_auto"="跟随设备语言";
          "loading"="加载中...";
          "managed_debs"="已管理的软件包";
          "no"="否";
          "no_downloads"="无已下载的软件包";
          "no_downloads_sub"="下载的 .deb 文件将显示在此处";
          "no_repos"="无软件源";
          "no_repos_sub"="添加软件源以开始浏览和下载 .deb 软件包";
          "no_results"="未找到结果。请尝试不同的搜索词。";
          "packages"="软件包";
          "packages_converted"="个软件包已转换";
          "remove"="移除";
          "repo_packages"="软件源软件包";
          "repo_url"="软件源 URL";
          "repos"="软件源";
          "save"="保存";
          "saved_to"="已保存到“文件”应用";
          "search"="搜索软件包...";
          "search_btn"="搜索";
          "search_results"="搜索结果";
          "searching"="搜索中...";
          "select"="选择";
          "settings"="设置";
          "share"="分享";
          "shared_via"="已打开分享面板";
          "start_search"="搜索 .deb 软件包";
          "start_search_sub"="从 iOS 软件源中查找插件、应用和工具";
          "supported_arch"="支持的架构";
          "supported_languages"="支持的语言";
          "target_arch"="目标架构";
          "trollstore_compatible"="兼容 TrollStore (巨魔)";
          "version"="版本 1.0.0";
          "yes"="是";
          EOF
          find . -name "Localizable.strings" -exec cp /tmp/zh.strings {} \;

      - name: Build
        run: |
          xcodebuild clean build -project DebManager.xcodeproj -scheme DebManager -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO -derivedDataPath build -destination "generic/platform=iOS"

      - name: Package with Binaries
        run: |
          mkdir -p Payload/DebManager.app
          cp -r build/Build/Products/Release-iphoneos/DebManager.app/ Payload/
          # 确保关键二进制文件被正确打包
          cp dpkg-deb zstd libzstd.1.dylib liblzma.5.dylib Payload/DebManager.app/
          zip -r9 DebManager_Fixed_Ultimate.tipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: DebManager-Fixed-Ultimate
          path: DebManager_Fixed_Ultimate.tipa
